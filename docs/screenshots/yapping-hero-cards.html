<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        width: 1280px;
        height: 480px;
        background: #0e0e10;
        color: #e8e8ea;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        overflow: hidden;
      }
      .wrap {
        width: 1280px;
        height: 480px;
        padding: 24px 32px 20px;
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 13px;
        color: #8a8a8e;
        letter-spacing: 0.4px;
        flex: 0 0 auto;
      }
      header .brand {
        font-weight: 700;
        color: #fff;
        letter-spacing: 1.5px;
        font-size: 14px;
      }
      header .sub {
        font-size: 11.5px;
        color: #6a6a6e;
        font-style: italic;
      }
      .cards {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        align-items: center;
        justify-items: center;
      }
      .card-wrap {
        background: #f4f4f4;
        border-radius: 14px;
        padding: 14px 16px;
        box-shadow:
          0 8px 28px rgba(0, 0, 0, 0.55),
          0 1px 0 rgba(255, 255, 255, 0.04);
        width: 100%;
        max-width: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 240px;
      }
      .card-wrap img {
        width: 100%;
        max-width: 240px;
        height: auto;
        display: block;
        border-radius: 6px;
        /* sharper rendering on retina */
        image-rendering: -webkit-optimize-contrast;
      }
      footer {
        text-align: center;
        font-size: 11.5px;
        color: #5a5a5e;
        letter-spacing: 0.3px;
        flex: 0 0 auto;
      }
      footer a {
        color: #9a9a9e;
        text-decoration: none;
      }
      .divider {
        color: #3a3a3e;
        margin: 0 8px;
      }
    </style>
  </head>
