name: Bug report
description: Something doesn't work right
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      placeholder: I called X tool with these args, expected Y, got Z.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. 14.6
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version (`node --version`)
    validations:
      required: true
  - type: textarea
    id: stderr
    attributes:
      label: Relevant stderr (osascript errors, MCP frames, etc.)
      render: shell
