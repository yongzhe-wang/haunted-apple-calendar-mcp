name: Labeler

on:
  - pull_request_target

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply area labels
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Label PR
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
